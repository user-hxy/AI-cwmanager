{% extends "base.html" %}
{% block title %}报表中心{% endblock %}
{% block content %}
<div class="page-header">
    <div class="d-flex justify-content-between align-items-center">
        <h4><i class="fas fa-chart-bar me-2"></i>报表中心</h4>
        <a href="/reports/history" class="btn btn-outline-info btn-sm"><i class="fas fa-history"></i> 历史报表</a>
    </div>
</div>
<div class="row g-3">
    <div class="col-md-4">
        <div class="card text-center h-100">
            <div class="card-body">
                <i class="fas fa-balance-scale fa-3x text-primary mb-3"></i>
                <h5>科目汇总表</h5>
                <p class="text-muted small">查看各科目期初、本期发生、期末余额</p>
                <a href="/reports/trial-balance" class="btn btn-outline-primary">查看 <i class="fas fa-arrow-right"></i></a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center h-100">
            <div class="card-body">
                <i class="fas fa-file-invoice fa-3x text-success mb-3"></i>
                <h5>资产负债表</h5>
                <p class="text-muted small">按期间生成，支持Excel导出</p>
                <a href="/reports/balance-sheet" class="btn btn-outline-success">查看 <i class="fas fa-arrow-right"></i></a>
            </div>
        </div>
    </div>
    <div class="col-md-4">
        <div class="card text-center h-100">
            <div class="card-body">
                <i class="fas fa-chart-line fa-3x text-warning mb-3"></i>
                <h5>利润表</h5>
                <p class="text-muted small">含本月数和累计数</p>
                <a href="/reports/income-statement" class="btn btn-outline-warning">查看 <i class="fas fa-arrow-right"></i></a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
