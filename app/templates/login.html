{% extends "base.html" %}
{% block title %}登录 - 财务管理系统{% endblock %}
{% block guest_content %}
<div class="login-container">
    <div class="login-card">
        <div class="login-header">
            <div class="login-icon"><i class="fas fa-cube"></i></div>
            <h2>企业财务管理</h2>
            <p class="text-muted">多公司 · 全流程 · 智能财务</p>
        </div>
        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}
        <form method="post" action="/auth/login">
            <div class="mb-3">
                <label class="form-label"><i class="fas fa-user"></i> 用户名</label>
                <input type="text" name="username" class="form-control form-control-lg" required placeholder="请输入用户名">
            </div>
            <div class="mb-4">
                <label class="form-label"><i class="fas fa-lock"></i> 密码</label>
                <input type="password" name="password" class="form-control form-control-lg" required placeholder="请输入密码">
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100 login-btn">
                <i class="fas fa-sign-in-alt"></i> 登录系统
            </button>
        </form>
        <div class="login-footer mt-3 text-center">
            <small class="text-muted">财务管理系统 v1.0</small>
        </div>
    </div>
</div>
{% endblock %}
{% block scripts %}{% endblock %}
