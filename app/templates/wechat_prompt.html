<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信验证 - 财务管理系统</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#eef4fb;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;font-size:16px;color:#1a2a4a}
        .card{max-width:400px;width:100%;background:#fff;border-radius:16px;padding:32px 24px;text-align:center;box-shadow:0 8px 32px rgba(43,123,228,0.1)}
        .wx-icon{width:64px;height:64px;background:#07c160;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#fff;font-size:32px;font-weight:bold}
        h5{font-size:18px;margin-bottom:12px;color:#1a2a4a}
        p{font-size:15px;color:#5a7a9a;line-height:1.6;margin-bottom:20px}
        .btn{display:block;width:100%;padding:12px;border-radius:8px;border:none;font-size:16px;font-weight:600;cursor:pointer;text-decoration:none;text-align:center}
        .btn-primary{background:linear-gradient(135deg,#2b7be4,#4a9eff);color:#fff}
        .small{font-size:13px;color:#8ab4e0;margin-top:16px}
    </style>
</head>
<body>
    <div class="card">
        <div class="wx-icon">微</div>
        <h5>{% if title %}{{ title }}{% else %}微信验证{% endif %}</h5>
        <p>{% if message %}{{ message }}{% else %}处理中...{% endif %}</p>
        {% if show_login %}
        <a href="{% if login_url %}{{ login_url }}{% else %}/auth/login{% endif %}" class="btn btn-primary">前往登录</a>
        {% endif %}
        <p class="small">财务管理系统</p>
    </div>
</body>
</html>
